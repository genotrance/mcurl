name: "Setup Python Environment"
description: "Set up Python environment for the given Python version"

inputs:
  python-version:
    description: "Python version to use"
    required: true
    default: "3.12"
  uv-version:
    description: "uv version to use"
    required: true
    default: "0.9.28"

runs:
  using: "composite"
  steps:
    - uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}
        allow-prereleases: true

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        version: ${{ inputs.uv-version }}
        enable-cache: 'true'
        cache-suffix: ${{ matrix.python-version }}

    - name: Install dependencies and build extension
      run: |
        uv sync
        # PyPy ships its own cffi/_cffi_backend; installing cffi 2.x over it breaks things
        if python -c "import sys; sys.exit(0 if sys.implementation.name == 'pypy' else 1)"; then
          uv pip install setuptools jbb
        else
          uv pip install setuptools cffi jbb
        fi
        uv pip install -e .
      shell: bash
      env:
        TMP: ${{ runner.temp }}
